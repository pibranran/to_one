<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>推格斗数 · 双人数学策略</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #1a2a1f 0%, #0f1b2d 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      padding: 12px;
    }
    .game-container {
      max-width: 700px;
      width: 100%;
      background: rgba(22, 34, 48, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 24px 20px 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 215, 150, 0.2);
      border: 1px solid #5f7f6b;
    }
    h1 {
      margin: 0 0 8px 0;
      font-weight: 500;
      text-align: center;
      color: #efe6d7;
      text-shadow: 0 4px 8px #00000040;
      letter-spacing: 6px;
      font-size: 2.1rem;
    }
    .subtitle {
      text-align: center;
      color: #b9c9b0;
      margin-bottom: 16px;
      font-style: italic;
      border-bottom: 1px dashed #5f7f6b;
      padding-bottom: 8px;
    }
    .board-wrapper {
      position: relative;
      margin: 10px 0;
    }
    .player-indicator {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding: 0 8px;
    }
    .player-badge {
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.3rem;
      box-shadow: 0 4px 0 #0f1a0f;
      transition: all 0.2s;
      border: 1px solid;
    }
    .red-badge {
      background: #b84a4a;
      color: #ffdab9;
      border-color: #ffb08e;
      box-shadow: 0 4px 0 #632c2c;
    }
    .blue-badge {
      background: #3a6ea5;
      color: #d4ecff;
      border-color: #aad0ff;
      box-shadow: 0 4px 0 #1d3b55;
    }
    .turn-active {
      transform: scale(1.02);
      box-shadow: 0 0 18px #f9e076, 0 4px 0 #3f2e1a;
      border-color: #ffd966;
    }
    .phase-info {
      background: #1e2c24;
      padding: 6px 18px;
      border-radius: 30px;
      color: #e3dcc0;
      font-weight: 600;
      font-size: 1.1rem;
      border: 1px solid #7f9a7b;
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      background: #2a3a2c;
      padding: 18px 12px;
      border-radius: 36px;
      box-shadow: inset 0 6px 8px #0e140e, 0 10px 12px #0000004d;
      border: 1px solid #7e9a74;
      margin-bottom: 12px;
    }
    .cell {
      aspect-ratio: 1 / 1;
      background: #263b2b;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      box-shadow: inset 0 -4px 0 #102010, 0 4px 6px #00000055;
      border: 2px solid #56734e;
      color: #f3efdd;
      transition: 0.1s ease;
      position: relative;
      cursor: pointer;
    }
    .cell.red {
      background: #ac4e4e;
      border-color: #f3ae8e;
      box-shadow: inset 0 -4px 0 #632a2a, 0 4px 6px #00000077;
      color: #fff3e2;
    }
    .cell.blue {
      background: #3f74a3;
      border-color: #aac9f0;
      box-shadow: inset 0 -4px 0 #1f3f5c, 0 4px 6px #00000077;
      color: #e9f2ff;
    }
    .cell.selected {
      outline: 4px solid #f5e57a;
      outline-offset: 2px;
      transform: scale(0.98);
      border-color: #ffd966;
    }
    .value-large {
      font-size: 2.2rem;
      line-height: 1;
      font-weight: 800;
      text-shadow: 2px 2px 0 #00000050;
    }
    .level-indicator {
      font-size: 1rem;
      background: #1e2a1cbb;
      padding: 2px 8px;
      border-radius: 30px;
      margin-top: 2px;
      backdrop-filter: blur(2px);
      font-weight: 600;
      color: #fbeec9;
      border: 1px solid #cfb27a;
    }
    .cell.high-tower {
      border: 3px solid #f3c26b;
      box-shadow: 0 0 12px #fbbc04, inset 0 -4px 0 #7a5c1a;
    }
    .cell.legendary {
      border: 4px solid #ffd966;
      box-shadow: 0 0 20px #ffbe3f, inset 0 -4px 0 #b57c00;
      animation: pulse-glow 1.2s infinite alternate;
    }
    @keyframes pulse-glow {
      from { box-shadow: 0 0 8px #ffd966, inset 0 -4px 0 #a57100; }
      to { box-shadow: 0 0 20px #ffb82e, inset 0 -4px 0 #ffcd7e; }
    }

    .action-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 18px 0 8px;
    }
    .direction-group {
      display: flex;
      gap: 10px;
      background: #1e2a24c9;
      padding: 8px 16px;
      border-radius: 48px;
      backdrop-filter: blur(4px);
      border: 1px solid #7e9e74;
    }
    .btn {
      background: #324f3e;
      border: none;
      border-bottom: 4px solid #142014;
      color: #f3efdd;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 10px 20px;
      min-width: 70px;
      border-radius: 48px;
      cursor: pointer;
      box-shadow: 0 4px 6px #00000040;
      transition: all 0.1s;
      border: 1px solid #7fa074;
    }
    .btn.small {
      font-size: 1rem;
      padding: 8px 16px;
      min-width: 60px;
    }
    .btn:active {
      transform: translateY(3px);
      border-bottom-width: 2px;
    }
    .btn:disabled {
      opacity: 0.4;
      transform: none;
      pointer-events: none;
      filter: grayscale(0.5);
    }
    .buff-section {
      display: flex;
      gap: 8px;
    }
    .buff-btn {
      background: #7a5d3c;
      border-bottom-color: #4d341f;
      border-color: #c9aa7b;
    }
    .reset-btn {
      background: #4d5f6b;
    }
    .status-message {
      min-height: 32px;
      color: #efdbaf;
      font-weight: 500;
      text-align: center;
      margin: 12px 0 0;
      font-size: 1.1rem;
    }
    .footer-note {
      color: #7f9a7b;
      text-align: center;
      margin-top: 8px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>⚔️ 推格斗数 ⚔️</h1>
  <div class="subtitle">· 逢十进一 · 四连高塔 ·</div>

  <div class="player-indicator">
    <div class="player-badge blue-badge" id="blueBadge">🔵 蓝方</div>
    <div class="phase-info" id="phaseDisplay">落子阶段</div>
    <div class="player-badge red-badge" id="redBadge">🔴 红方</div>
  </div>

  <div class="board-wrapper">
    <div class="grid-container" id="board"></div>
  </div>

  <div class="action-panel">
    <div class="direction-group" id="directionPanel">
      <button class="btn small" id="pushForward">⬆️ 前</button>
      <button class="btn small" id="pushLeft">⬅️ 左</button>
      <button class="btn small" id="pushRight">➡️ 右</button>
    </div>
    <div class="buff-section">
      <button class="btn buff-btn small" id="buffUpgrade">✨ 升格+1</button>
      <button class="btn buff-btn small" id="buffDelete">💥 删除敌格</button>
    </div>
    <button class="btn reset-btn small" id="resetGame">🔄 重开</button>
  </div>
  
  <div id="statusMsg" class="status-message">🔴 红方先落子 (己方半场)</div>
  <div class="footer-note">← 点击己方格选中 · 答题启用buff · 层数≥5金边 ≥10胜利 →</div>
</div>

<script>
  (function(){
    "use strict";

    const BOARD_SIZE = 6;
    const WIN_LEVEL = 10;
    const TOWER_LEVEL = 5;

    let board = [];
    let currentPhase = 'placing';     
    let currentPlayer = 'red';        
    let firstPlayerBattle = 'blue';   
    let selectedCell = null;         
    let winner = null;               
    let turnCount = 0;              
    let placedRed = false;
    let placedBlue = false;

    const boardEl = document.getElementById('board');
    const phaseDisplay = document.getElementById('phaseDisplay');
    const statusMsg = document.getElementById('statusMsg');
    const blueBadge = document.getElementById('blueBadge');
    const redBadge = document.getElementById('redBadge');
    
    const pushForward = document.getElementById('pushForward');
    const pushLeft = document.getElementById('pushLeft');
    const pushRight = document.getElementById('pushRight');
    const buffUpgrade = document.getElementById('buffUpgrade');
    const buffDelete = document.getElementById('buffDelete');
    const resetBtn = document.getElementById('resetGame');

    // ---------- 方向映射 ----------
    function getDirectionDeltas(player) {
      if (player === 'red') {
        return { forward: [-1, 0], left: [0, -1], right: [0, 1] };
      } else {
        return { forward: [1, 0], left: [0, 1], right: [0, -1] };
      }
    }

    function isValidCell(r, c) {
      return r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE;
    }

    function createEmptyBoard() {
      return Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill().map(() => ({
        player: null, value: 0, level: 0
      })));
    }

    // 重置
    function resetGame() {
      board = createEmptyBoard();
      currentPhase = 'placing';
      currentPlayer = 'red';
      placedRed = false;
      placedBlue = false;
      selectedCell = null;
      winner = null;
      turnCount = 0;
      updateUI();
      renderBoard();
      setStatusMessage('🔴 红方先落子 (只能放在最下方两行)');
    }

    // 胜利检测
    function checkVictory() {
      for (let r=0; r<BOARD_SIZE; r++) {
        for (let c=0; c<BOARD_SIZE; c++) {
          const cell = board[r][c];
          if (cell.player && cell.level >= WIN_LEVEL) return cell.player;
        }
      }
      const dirs = [[0,1],[1,0]];
      for (let r=0; r<BOARD_SIZE; r++) {
        for (let c=0; c<BOARD_SIZE; c++) {
          const cell = board[r][c];
          if (!cell.player || cell.level < TOWER_LEVEL) continue;
          const player = cell.player;
          for (let [dr, dc] of dirs) {
            let count = 1;
            let nr = r + dr, nc = c + dc;
            while (isValidCell(nr, nc) && board[nr][nc].player === player && board[nr][nc].level >= TOWER_LEVEL) {
              count++;
              nr += dr;
              nc += dc;
            }
            if (count >= 4) return player;
          }
        }
      }
      if (currentPhase === 'battle' && turnCount >= 120) return 'draw';
      return null;
    }

    function applyCarry(cell) {
      let changed = false;
      while (cell.value >= 10) {
        cell.level += 1;
        cell.value = 1;
        changed = true;
      }
      return changed;
    }

    function afterMoveCheck() {
      const victor = checkVictory();
      if (victor) {
        winner = victor;
        currentPhase = 'gameover';
        setStatusMessage(victor === 'draw' ? '🤝 平局！超过120回合' : `${victor === 'red' ? '🔴 红方' : '🔵 蓝方'} 达成胜利！`);
        updateUI();
        renderBoard();
      }
    }

    // 核心推操作
    function executePush(selectedRow, selectedCol, direction) {
      if (currentPhase !== 'battle' || winner) return false;
      const cell = board[selectedRow][selectedCol];
      if (!cell.player || cell.player !== currentPlayer) {
        setStatusMessage('只能推动自己的格子');
        return false;
      }
      
      const deltas = getDirectionDeltas(currentPlayer);
      let delta;
      if (direction === 'forward') delta = deltas.forward;
      else if (direction === 'left') delta = deltas.left;
      else if (direction === 'right') delta = deltas.right;
      else return false;
      
      const nr = selectedRow + delta[0];
      const nc = selectedCol + delta[1];
      if (!isValidCell(nr, nc)) {
        setStatusMessage('无法推向棋盘外');
        return false;
      }
      
      const targetCell = board[nr][nc];
      const sourceCell = cell;
      
      if (targetCell.player === null) {
        targetCell.player = currentPlayer;
        targetCell.value = sourceCell.value + 1;
        targetCell.level = sourceCell.level;
        applyCarry(targetCell);
      } else if (targetCell.player === currentPlayer) {
        targetCell.value = sourceCell.value + 1;
        applyCarry(targetCell);
      } else {
        // 敌方: 占领，数值层数不变
        targetCell.player = currentPlayer;
      }
      
      turnCount++;
      currentPlayer = currentPlayer === 'red' ? 'blue' : 'red';
      selectedCell = null;
      
      renderBoard();
      const victor = checkVictory();
      if (victor) {
        winner = victor;
        currentPhase = 'gameover';
        setStatusMessage(victor === 'draw' ? '🤝 平局' : `${victor === 'red' ? '🔴 红方' : '🔵 蓝方'} 胜利！`);
      } else {
        setStatusMessage(`${currentPlayer === 'red' ? '🔴 红方' : '🔵 蓝方'} 的回合，点击己方格子选中`);
      }
      updateUI();
      return true;
    }

    // 落子
    function tryPlace(row, col) {
      if (currentPhase !== 'placing' || winner) return false;
      if (board[row][col].player !== null) {
        setStatusMessage('这里已经有格子了');
        return false;
      }
      
      const isRedArea = (row === 4 || row === 5);
      const isBlueArea = (row === 0 || row === 1);
      
      if (currentPlayer === 'red' && !isRedArea) {
        setStatusMessage('红方只能放在最下方两行 (第5、6行)');
        return false;
      }
      if (currentPlayer === 'blue' && !isBlueArea) {
        setStatusMessage('蓝方只能放在最上方两行 (第1、2行)');
        return false;
      }
      
      board[row][col] = { player: currentPlayer, value: 1, level: 1 };
      
      if (currentPlayer === 'red') placedRed = true;
      else placedBlue = true;
      
      if (placedRed && placedBlue) {
        currentPhase = 'battle';
        currentPlayer = firstPlayerBattle;
        turnCount = 0;
        setStatusMessage('⚔️ 对战开始！蓝方先推 · 点击蓝方格子选中');
      } else {
        currentPlayer = currentPlayer === 'red' ? 'blue' : 'red';
        setStatusMessage(`${currentPlayer === 'red' ? '🔴 红方' : '🔵 蓝方'} 落子`);
      }
      
      selectedCell = null;
      renderBoard();
      updateUI();
      
      if (currentPhase === 'battle') {
        const v = checkVictory();
        if (v) { winner = v; currentPhase = 'gameover'; updateUI(); }
      }
      return true;
    }

    // BUFF答题
    function simpleMathQuiz(callback) {
      const a = Math.floor(Math.random() * 5) + 1;
      const b = Math.floor(Math.random() * 5) + 1;
      const answer = a + b;
      const userAnswer = prompt(`🧮 答题启用buff: ${a} + ${b} = ?`);
      if (userAnswer !== null && parseInt(userAnswer, 10) === answer) {
        callback(true);
      } else {
        alert('❌ 答案错误或取消');
        callback(false);
      }
    }

    function useBuffUpgrade() {
      if (currentPhase !== 'battle' || winner) { alert('现在不能使用buff'); return; }
      if (!selectedCell) { alert('请先选中一个你的格子'); return; }
      const { row, col } = selectedCell;
      const cell = board[row][col];
      if (!cell.player || cell.player !== currentPlayer) { alert('只能对自己的格子使用升格'); return; }
      
      simpleMathQuiz((success) => {
        if (!success) return;
        cell.value += 1;
        cell.level += 1;
        applyCarry(cell);
        renderBoard();
        const victor = checkVictory();
        if (victor) {
          winner = victor;
          currentPhase = 'gameover';
          setStatusMessage(victor==='draw'?'平局':`${victor==='red'?'🔴红':'🔵蓝'}方胜利！`);
        } else {
          setStatusMessage(`升格成功`);
        }
        updateUI();
      });
    }

    function useBuffDelete() {
      if (currentPhase !== 'battle' || winner) { alert('现在不能使用'); return; }
      if (!selectedCell) { alert('请选中一个敌方格子'); return; }
      const { row, col } = selectedCell;
      const cell = board[row][col];
      if (!cell.player || cell.player === currentPlayer) { alert('必须选中敌方格子才能删除'); return; }
      
      simpleMathQuiz((success) => {
        if (!success) return;
        board[row][col] = { player: null, value: 0, level: 0 };
        selectedCell = null;
        renderBoard();
        const victor = checkVictory();
        if (victor) {
          winner = victor;
          currentPhase = 'gameover';
          setStatusMessage(victor==='draw'?'平局':`${victor==='red'?'🔴红':'🔵蓝'}方胜利！`);
        } else {
          setStatusMessage(`敌方格被消除`);
        }
        updateUI();
      });
    }

    // 渲染
    function renderBoard() {
      boardEl.innerHTML = '';
      for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
          const cell = board[r][c];
          const cellDiv = document.createElement('div');
          cellDiv.className = 'cell';
          if (cell.player === 'red') cellDiv.classList.add('red');
          if (cell.player === 'blue') cellDiv.classList.add('blue');
          if (cell.level >= WIN_LEVEL) cellDiv.classList.add('legendary');
          else if (cell.level >= TOWER_LEVEL) cellDiv.classList.add('high-tower');
          
          if (selectedCell && selectedCell.row === r && selectedCell.col === c) {
            cellDiv.classList.add('selected');
          }
          
          const valueSpan = document.createElement('div');
          valueSpan.className = 'value-large';
          valueSpan.textContent = cell.player ? cell.value : '';
          
          const levelSpan = document.createElement('div');
          levelSpan.className = 'level-indicator';
          levelSpan.textContent = cell.player ? `Lv.${cell.level}` : '';
          
          cellDiv.appendChild(valueSpan);
          cellDiv.appendChild(levelSpan);
          
          cellDiv.addEventListener('click', () => handleCellClick(r, c));
          boardEl.appendChild(cellDiv);
        }
      }
    }

    function handleCellClick(row, col) {
      if (winner || currentPhase === 'gameover') {
        setStatusMessage('游戏已结束，重开一局吧');
        return;
      }
      
      const cell = board[row][col];
      
      if (currentPhase === 'placing') {
        tryPlace(row, col);
        return;
      }
      
      if (currentPhase === 'battle') {
        // 点击逻辑：只能选中己方或敌方（用于buff），但推动必须选中己方
        if (cell.player) {
          selectedCell = { row, col };
          if (cell.player === currentPlayer) {
            setStatusMessage(`选中己方格 (${row+1},${col+1})，选择方向推动`);
          } else {
            setStatusMessage(`选中敌方格子，可使用删除buff`);
          }
        } else {
          selectedCell = null;
          setStatusMessage('点击格子选中 (己方格子才能推动)');
        }
        renderBoard();
        updateUI(); // 更新按钮状态
      }
    }

    function updateUI() {
      blueBadge.classList.toggle('turn-active', currentPlayer === 'blue' && !winner && currentPhase !== 'gameover');
      redBadge.classList.toggle('turn-active', currentPlayer === 'red' && !winner && currentPhase !== 'gameover');
      
      if (currentPhase === 'placing') phaseDisplay.textContent = '🏁 落子阶段';
      else if (currentPhase === 'battle') phaseDisplay.textContent = `⚡ 对战 · 回合 ${turnCount}`;
      else if (currentPhase === 'gameover') phaseDisplay.textContent = winner==='draw'?'🤝 平局':`🏆 ${winner==='red'?'红':'蓝'}方胜利`;
      
      const battleActive = (currentPhase === 'battle' && !winner);
      // 方向按钮：只有选中己方格子时才启用
      const canPush = battleActive && selectedCell && board[selectedCell.row][selectedCell.col].player === currentPlayer;
      pushForward.disabled = !canPush;
      pushLeft.disabled = !canPush;
      pushRight.disabled = !canPush;
      
      buffUpgrade.disabled = !battleActive;
      buffDelete.disabled = !battleActive;
    }

    function setStatusMessage(msg) {
      statusMsg.textContent = msg;
    }

    // 绑定事件
    pushForward.addEventListener('click', () => {
      if (!selectedCell) return;
      executePush(selectedCell.row, selectedCell.col, 'forward');
    });
    pushLeft.addEventListener('click', () => {
      if (!selectedCell) return;
      executePush(selectedCell.row, selectedCell.col, 'left');
    });
    pushRight.addEventListener('click', () => {
      if (!selectedCell) return;
      executePush(selectedCell.row, selectedCell.col, 'right');
    });
    
    buffUpgrade.addEventListener('click', useBuffUpgrade);
    buffDelete.addEventListener('click', useBuffDelete);
    resetBtn.addEventListener('click', resetGame);

    resetGame();
  })();
</script>
</body>
</html>
